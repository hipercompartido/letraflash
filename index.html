<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>

<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#121212"/>

<title>LetraFlash 🎮</title>

<style>
:root {
  --bg: #121212;
  --accent: #ff9800;
  --text: #ffffff;
  --text-dim: #b0b0b0;
  --used: #1e1e1e;
  --success: #69f0ae;
  --safe-top: env(safe-area-inset-top);
  --safe-bottom: env(safe-area-inset-bottom);
  --safe-left: env(safe-area-inset-left);
  --safe-right: env(safe-area-inset-right);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

/* 🔥 FIX REAL */
html, body {
  width: 100%;
  height: 100%;
  overflow-x: hidden;
  overscroll-behavior: none;
  touch-action: manipulation;
  -webkit-user-select: none;
  user-select: none;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  padding: var(--safe-top) var(--safe-right) var(--safe-bottom) var(--safe-left);
  -webkit-tap-highlight-color: transparent;
}

/* BANNER */
.banner {
  flex-shrink: 0;
  background: linear-gradient(135deg, var(--accent), #e65100);
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 7px 16px;
}

.banner-tema { flex: 1; min-width: 0; }

.banner-tema .lbl {
  font-size: 9px;
  font-weight: 700;
  color: rgba(0,0,0,0.55);
}

.banner-tema h1 {
  font-size: clamp(15px, 3.2vw, 21px);
  font-weight: 800;
  color: #000;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* TIMER */
.timer {
  width: clamp(42px, 6.5vh, 54px);
  height: clamp(42px, 6.5vh, 54px);
  border-radius: 50%;
  background: conic-gradient(rgba(0,0,0,0.7) 360deg, rgba(0,0,0,0.15) 360deg);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.timer::before {
  content: '';
  position: absolute;
  width: 80%;
  height: 80%;
  background: linear-gradient(135deg, #ffb74d, #e65100);
  border-radius: 50%;
}

.timer span {
  position: relative;
  font-size: clamp(15px, 3vh, 19px);
  font-weight: 800;
  color: #000;
}

/* MAIN */
.main {
  flex: 1;
  min-height: 0;
  display: flex;
  overflow: hidden; /* 🔥 FIX */
}

/* LETRAS */
.side-letters {
  width: clamp(38px, 8.5vw, 56px);
  display: flex;
  flex-direction: column;
  padding: 5px;
  gap: 4px;
}

.side-letter {
  flex: 1;
  background: #1e1e1e;
  border: 1.5px solid rgba(255,152,0,0.4);
  border-radius: 7px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(10px, 2vh, 15px);
  font-weight: 800;
}

.side-letter.used {
  background: var(--used);
  color: #484848;
  text-decoration: line-through;
}

/* RIGHT */
.right-area {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

.btn-start {
  padding: 14px;
  background: var(--success);
  border: none;
  border-radius: 12px;
  font-weight: bold;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  align-items: center;
  justify-content: center;
}

.modal.active {
  display: flex;
}
</style>
</head>

<body>

<div class="banner">
  <div class="banner-tema">
    <span class="lbl">🎯 Temática</span>
    <h1 id="categoria">¡LISTOS?</h1>
  </div>

  <div class="timer">
    <span id="timer-text">5</span>
  </div>

  <div class="bstat">
    <span id="score">0</span>
  </div>

  <div class="bstat">
    <span id="record">0</span>
  </div>
</div>

<div class="main">
  <div class="side-letters" id="sideLetters"></div>

  <div class="right-area" id="rightArea">
    <button class="btn-start" onclick="iniciarJuego()">INICIAR</button>
  </div>
</div>

<div class="modal" id="modal"></div>

<script>
const ABECEDARIO = "ABCDEFGHIJKLMNÑOPQRSTUVWXYZ".split('');
let usadas = [];
let activo = false;
let tiempo = 5;
let puntos = 0;
let interval;

const cont = document.getElementById("sideLetters");

ABECEDARIO.forEach(l=>{
  const d = document.createElement("div");
  d.className = "side-letter";
  d.innerText = l;
  d.onclick = ()=>clickLetra(l);
  cont.appendChild(d);
});

function iniciarJuego(){
  usadas = [];
  puntos = 0;
  tiempo = 5;
  activo = true;

  document.getElementById("score").innerText = 0;

  document.querySelectorAll(".side-letter").forEach(t=>t.classList.remove("used"));

  clearInterval(interval);
  interval = setInterval(()=>{
    tiempo--;
    document.getElementById("timer-text").innerText = tiempo;
    if(tiempo<=0) terminar();
  },1000);
}

function clickLetra(l){
  if(!activo || usadas.includes(l)) return;

  usadas.push(l);
  puntos++;
  tiempo = 5;

  document.getElementById("score").innerText = puntos;

  document.querySelectorAll(".side-letter").forEach(t=>{
    if(t.innerText===l) t.classList.add("used");
  });
}

function terminar(){
  activo = false;
  clearInterval(interval);
  alert("Puntaje: "+puntos);
}

/* 🔥 BLOQUEO ZOOM COMPLETO */

// doble tap
let lastTap = 0;
document.addEventListener('touchend', (e)=>{
  const now = Date.now();
  if(now - lastTap <= 300) e.preventDefault();
  lastTap = now;
}, false);

// pinch real
['gesturestart','gesturechange','gestureend'].forEach(ev=>{
  document.addEventListener(ev, e=>e.preventDefault());
});
</script>

</body>
</html>
