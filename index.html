<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />

  <!-- 🔥 BLOQUEO TOTAL DE ZOOM -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>

  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="theme-color" content="#121212"/>

  <title>LetraFlash 🎮</title>

  <style>
    :root {
      --bg: #121212;
      --card: #1e1e1e;
      --accent: #ff9800;
      --text: #ffffff;
      --text-dim: #b0b0b0;
      --used: #333;
      --success: #69f0ae;
      --danger: #ff5252;
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      overscroll-behavior: none;
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
      overflow-x: hidden; /* 🔥 evita desbordes */
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: calc(8px + var(--safe-top)) 16px calc(8px + var(--safe-bottom));
      -webkit-tap-highlight-color: transparent;
    }

    header {
      width: 100%;
      max-width: 500px;
      background: linear-gradient(135deg, var(--accent), #e65100);
      padding: calc(16px + var(--safe-top)) 20px 20px;
      border-radius: 0 0 24px 24px;
      text-align: center;
      margin-bottom: 12px;
    }

    header small {
      color: rgba(0,0,0,0.7);
      font-weight: 600;
      font-size: 13px;
    }

    header h1 {
      font-size: clamp(22px, 5vw, 28px);
      margin-top: 4px;
      color: #000;
    }

    .stats {
      display: flex;
      justify-content: space-around;
      width: 100%;
      max-width: 500px;
      margin: 8px 0 12px;
    }

    .stat {
      text-align: center;
    }

    .stat-label {
      font-size: 10px;
      color: var(--text-dim);
    }

    .stat-value {
      font-size: clamp(18px, 4vw, 22px);
      font-weight: bold;
    }

    .timer {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: conic-gradient(var(--success) 360deg, #333 360deg);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .timer::before {
      content: '';
      position: absolute;
      width: 85%;
      height: 85%;
      background: var(--bg);
      border-radius: 50%;
    }

    .timer span {
      position: relative;
      font-size: 22px;
      font-weight: bold;
    }

    /* 🔥 GRID ARREGLADO */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr)); /* 👈 clave */
      gap: 10px;
      width: 100%;
      max-width: 500px;
      margin: 0 auto;
    }

    /* 🔥 TILE FIX */
    .tile {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(16px, 6vmin, 24px); /* 👈 clave */
      font-weight: 800;
      background: #1e1e1e;
      border: 2px solid rgba(255,152,0,0.5);
      border-radius: 14px;
      cursor: pointer;
    }

    .tile:active {
      transform: scale(0.92);
    }

    .tile.used {
      background: var(--used);
      color: #666;
      text-decoration: line-through;
    }

    .btn-start {
      width: 100%;
      max-width: 500px;
      padding: 16px;
      background: var(--success);
      color: #000;
      border: none;
      border-radius: 14px;
      font-size: 18px;
      font-weight: bold;
      margin: 20px 0;
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      align-items: center;
      justify-content: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: #1e1e1e;
      padding: 24px;
      border-radius: 20px;
      width: 90%;
      max-width: 400px;
      text-align: center;
    }
  </style>
</head>

<body>

<header>
  <small>🎯 TEMÁTICA</small>
  <h1 id="categoria">¡LISTOS?</h1>
</header>

<div class="stats">
  <div class="stat">
    <div class="stat-label">Letras</div>
    <div class="stat-value" id="score">0</div>
  </div>

  <div class="timer" id="timer">
    <span id="timer-text">5</span>
  </div>

  <div class="stat">
    <div class="stat-label">Récord</div>
    <div class="stat-value" id="record">0</div>
  </div>
</div>

<div class="grid" id="grid"></div>

<button class="btn-start" onclick="iniciarJuego()">▶️ INICIAR</button>

<script>
const ABECEDARIO = "ABCDEFGHIJKLMNÑOPQRSTUVWXYZ".split('');
const TIEMPO_TOTAL = 5;

let usadas = [];
let activo = false;
let tiempo = 5;
let puntaje = 0;
let interval;

const grid = document.getElementById("grid");

ABECEDARIO.forEach(l => {
  const div = document.createElement("div");
  div.className = "tile";
  div.innerText = l;
  div.onclick = () => clickLetra(l);
  grid.appendChild(div);
});

function iniciarJuego() {
  usadas = [];
  puntaje = 0;
  tiempo = TIEMPO_TOTAL;
  activo = true;

  document.getElementById("score").innerText = 0;

  document.querySelectorAll(".tile").forEach(t => t.classList.remove("used"));

  clearInterval(interval);
  interval = setInterval(() => {
    tiempo--;
    document.getElementById("timer-text").innerText = tiempo;
    if (tiempo <= 0) terminar();
  }, 1000);
}

function clickLetra(l) {
  if (!activo || usadas.includes(l)) return;

  usadas.push(l);
  puntaje++;
  tiempo = TIEMPO_TOTAL;

  document.getElementById("score").innerText = puntaje;

  document.querySelectorAll(".tile").forEach(t => {
    if (t.innerText === l) t.classList.add("used");
  });
}

function terminar() {
  activo = false;
  clearInterval(interval);
  alert("Puntaje: " + puntaje);
}

/* 🔥 BLOQUEO DOBLE TAP ZOOM */
let lastTouch = 0;
document.addEventListener("touchend", e => {
  const now = Date.now();
  if (now - lastTouch < 300) e.preventDefault();
  lastTouch = now;
}, false);

/* 🔥 BLOQUEO PINCH ZOOM */
document.addEventListener('gesturestart', e => e.preventDefault());
document.addEventListener('gesturechange', e => e.preventDefault());
document.addEventListener('gestureend', e => e.preventDefault());
</script>

</body>
</html>
